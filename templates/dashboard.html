<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #f8f9fa);
        }

        /* Navbar */
        .custom-navbar {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sidebar */
        .sidebar {
            background: #1e293b;
            min-height: 100vh;
        }

        .sidebar .nav-link {
            color: #cbd5e1;
            transition: 0.3s;
        }

        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 6px;
            padding-left: 10px;
        }

        /* Cards */
        .stat-card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .welcome-card {
            border-radius: 12px;
        }

        .user-name {
            color: #007bff;
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand">
            Complaint Management System
        </span>
        <div class="ms-auto">
            <a href="/logout" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-center text-white mb-4">Menu</h5>
            <ul class="nav flex-column">
                <li class="nav-item mb-3">
                    <a class="nav-link" href="/dashboard">
                        <i class="fa fa-home me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item mb-3">
                    <a class="nav-link" href="/submit">
                        <i class="fa fa-plus-circle me-2"></i> Submit Complaint
                    </a>
                </li>
                <li class="nav-item mb-3">
                    <a class="nav-link" href="/mycomplaints">
                        <i class="fa fa-list me-2"></i> My Complaints
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Welcome -->
            <div class="card welcome-card shadow mb-4">
                <div class="card-body">
                    <h3>
                        Welcome <span class="user-name">{{ name }}</span> 👋
                    </h3>
                    <p class="text-muted mb-0">
                        Track, manage and monitor your complaints efficiently.
                    </p>
                </div>
            </div>

            <!-- Stats -->
            <div class="row mb-4">

                <div class="col-md-4">
                    <div class="card text-white bg-primary text-center stat-card">
                        <div class="card-body">
                            <i class="fa fa-file fa-2x mb-2"></i>
                            <h6>Total Complaints</h6>
                            <h2 class="counter" data-target="{{ total }}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-dark bg-warning text-center stat-card">
                        <div class="card-body">
                            <i class="fa fa-clock fa-2x mb-2"></i>
                            <h6>Pending</h6>
                            <h2 class="counter" data-target="{{ pending }}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-white bg-success text-center stat-card">
                        <div class="card-body">
                            <i class="fa fa-check-circle fa-2x mb-2"></i>
                            <h6>Resolved</h6>
                            <h2 class="counter" data-target="{{ resolved }}">0</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Chart -->
            <div class="card shadow p-4">
                <h5 class="mb-3">Complaint Overview</h5>
                <canvas id="complaintChart"></canvas>
            </div>

        </div>
    </div>
</div>

<!-- Safe JSON Data -->
<script type="application/json" id="chart-data">
{
    "pending": {{ pending | tojson }},
    "resolved": {{ resolved | tojson }}
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    /* Animated Counters */
    const counters = document.querySelectorAll(".counter");

    counters.forEach(counter => {
        const target = +counter.getAttribute("data-target");
        let count = 0;
        const increment = target > 0 ? Math.ceil(target / 50) : 1;

        const update = () => {
            if (count < target) {
                count += increment;
                counter.innerText = count;
                setTimeout(update, 20);
            } else {
                counter.innerText = target;
            }
        };

        update();
    });

    /* Chart */
    const chartData = JSON.parse(
        document.getElementById("chart-data").textContent
    );

    new Chart(document.getElementById("complaintChart"), {
        type: "doughnut",
        data: {
            labels: ["Pending", "Resolved"],
            datasets: [{
                data: [chartData.pending, chartData.resolved],
                backgroundColor: ["#ffc107", "#28a745"],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: "bottom"
                }
            }
        }
    });

});
</script>

</body>
</html>
